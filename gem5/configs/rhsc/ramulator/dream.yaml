Frontend:
  impl: GEM5
  clock_ratio: 8

MemorySystem:
  impl: BHDRAMSystem
  clock_ratio: 3

  DRAM:
    impl: DDR5-VRR
    org:
      preset: DDR5_16Gb_x8
      channel: 1
      rank: 2
    timing:
      preset: DDR5_3200AN 
    RFM:
      BRC: 2

  BHDRAMController:
    impl: BHDRAMController
    BHScheduler:
      impl: BHScheduler
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 16
    plugins:
      - ControllerPlugin:
          impl: DREAM
          threshold: 40
          gang_size: 32
          debug: true


  AddrMapper:
    impl: RoBaRaCoCh_with_rit
