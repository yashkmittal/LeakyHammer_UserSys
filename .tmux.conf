# LeakyHammer tmux configuration
# Keeps sessions alive through WSL disconnects

# --- Session persistence ---
set -g destroy-unattached off
set -g exit-unattached off
set -g detach-on-destroy off

# --- General ---
set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# Increase scrollback for long gem5 output
set -g history-limit 100000

# Don't wait for escape sequences (faster key response)
set -sg escape-time 0

# --- Prefix key ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Pane navigation (Alt+arrow, no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Splits that remember current path ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Mouse support ---
set -g mouse on

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour46,bold] #S #[fg=colour248]| "
set -g status-right "#[fg=colour214]#{pane_current_command} #[fg=colour248]| #[fg=colour39]%Y-%m-%d %H:%M #[fg=colour248]| #[fg=colour154]up #{t:session_created}"

# Active window
setw -g window-status-current-style "fg=colour46,bg=colour238,bold"
setw -g window-status-current-format " #I:#W "

# Inactive windows
setw -g window-status-style "fg=colour248,bg=colour235"
setw -g window-status-format " #I:#W "

# --- Activity monitoring ---
setw -g monitor-activity on
set -g visual-activity on

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
